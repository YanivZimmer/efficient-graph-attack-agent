# Research State — Central Project Tracking
# Initialized from the autoresearch skill templates and the current repo state.

project:
  title: "Weakly Supervised GNN Incident Discovery for SOC Alert Graphs"
  question: "Can weakly supervised alert-entity graph models discover coherent security incidents from alert-level labels alone, and close the gap to rule-based and incident-supervised baselines?"
  status: active
  started: "2026-06-29"
  domain: "cybersecurity ML / incident discovery"

literature:
  key_papers:
    - id: "freitas2024graphweaver"
      title: "GraphWeaver: Billion-Scale Cybersecurity Incident Correlation"
      authors: "Freitas and Gharib"
      year: 2024
      relevance: "Industry alert-correlation lower bound built around graph-based incident correlation."
    - id: "hu2020hgt"
      title: "Heterogeneous Graph Transformer"
      authors: "Hu et al."
      year: 2020
      relevance: "Backbone architecture for heterogeneous node/edge-type message passing."
    - id: "hamilton2017graphsage"
      title: "Inductive Representation Learning on Large Graphs"
      authors: "Hamilton, Ying, and Leskovec"
      year: 2017
      relevance: "GraphSAGE backbone used by several repo baselines, including the local GRAIN-style implementation."
    - id: "scargle2013bayesianblocks"
      title: "The Bayesian Block Algorithm"
      authors: "Scargle, Norris, Jackson, and Chiang"
      year: 2013
      relevance: "Fresh event-stream segmentation baseline; local experiments show raw rate-change blocks over-fragment incident-level alert groups."
    - id: "wang2024cordgt"
      title: "Dynamic Graph Transformer with Correlated Spatial-Temporal Positional Encoding"
      authors: "Wang et al."
      year: 2024
      relevance: "Supports explicit spatial-temporal encodings for evolving graphs as a future model-side direction."
    - id: "kulatilleke2022scgc"
      title: "SCGC: Self-Supervised Contrastive Graph Clustering"
      authors: "Kulatilleke, Portmann, and Chandra"
      year: 2022
      relevance: "Supports cluster-oriented contrastive objectives as an alternative to pure node classification."
  open_problems:
    - "Weakly supervised models can achieve strong node classification while still failing incident construction unless the temporal episode scale is modeled."
    - "Primary-dataset weakly supervised runs are unstable across reruns, which blocks strong claims."
    - "Current DBSCAN post-processing often merges too many malicious alerts into one giant incident; the best AIT-ADS result no longer needs DBSCAN after candidate selection."
    - "Unconstrained macro-gap temporal estimation matches the best full-slice split but fails on chronological folds; a 4h macro-gap floor improves holdout robustness."
  evidence_gaps:
    - "Need reproducible multi-seed weakly supervised comparisons across primary and AIT-ADS."
    - "Need ablations separating triage quality from clustering quality."
    - "Need stronger evidence that heterogeneous edges help more than homogeneous alert-alert projections."

hypotheses:
  - id: H1
    statement: "Weakly supervised incident discovery underperforms mainly because post-classification clustering is too coarse, not because alert embeddings are unusable."
    status: active
    motivation: "AIT-ADS weakly supervised methods show near-perfect node metrics but poor cluster precision."
    parent: null
    priority: high
  - id: H2
    statement: "Heterogeneous alert-entity message passing should outperform homogeneous alert-alert baselines once clustering is better calibrated."
    status: pending
    motivation: "HGAT should have an inductive advantage if entity structure is being used rather than collapsed away."
    parent: null
    priority: high
  - id: H3
    statement: "The current primary-dataset instability is driven by thresholding, random split sensitivity, or training variance rather than a fundamental lack of signal."
    status: active
    motivation: "Standalone HGAT and comparison-run HGAT results disagree materially on the same dataset family."
    parent: null
    priority: medium
  - id: H4
    statement: "Incident-scale temporal gaps can be estimated from weakly selected alert streams by ignoring telemetry micro-bursts and detecting macro-gap elbows, but the minimum macro-gap floor must be robustly chosen."
    status: active
    motivation: "On AIT-ADS, unconstrained macro-elbow matches full-slice 4h but fails on chronological folds; macro_elbow_floor4 improves mean holdout F1 to 0.9588."
    parent: H1
    priority: high

